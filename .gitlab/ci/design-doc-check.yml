# 生きた設計書（docs/design/）の更新を MR で要求する CI ジョブ（include 用スニペット）。
#
# 有効化: 出荷のルート .gitlab-ci.yml が既にこのスニペットを include 済み（追加設定は不要）。
# ジョブを分離スニペットにしているのは、無効化を include 1 行の削除で済ませ、既存 CI と
# 衝突させないため:
#
#   include:
#     - local: .gitlab/ci/design-doc-check.yml
#
# feature/* ・ fix/* からの MR で docs/design/ の更新を要求する。
# 逃がし: MR 説明に「Design: none」行、または「design:none」ラベル。
# ローカルの .githooks/commit-msg と二重ガード。設計書チェックが不要ならルート .gitlab-ci.yml の
# include 行を外す。stage: test は出荷のルート .gitlab-ci.yml の stages に対応（独自 stages の
# プロジェクトへ後載せする場合は自分の stages に合わせて変更すること）。
# 補助ジョブ（不要ならジョブ単位で削除してよい）:
#   - requirements-doc-check : docs/要件定義書.md の必須節の欠落を警告（存在する場合のみ・fail しない）
#   - ui-section-check       : frontmatter が kind: ui の設計書に「## UI/画面設計」見出しを要求（fail する）
#   - data-model-section-check : frontmatter が kind: data の設計書に「## データモデル」見出しを要求（fail する）
design-doc-check:
  stage: test
  image: alpine:latest
  variables:
    GIT_DEPTH: 0   # merge-base（CI_MERGE_REQUEST_DIFF_BASE_SHA）を確実に含める（浅いクローンだと bad revision で落ちる）
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^(feature|fix)\// && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main")'
  before_script:
    - apk add --no-cache git >/dev/null
  script:
    - |
      set -eu
      # 逃がし: design:none ラベル（CI_MERGE_REQUEST_LABELS はラベル無し MR では未定義のため :- で空に落とす）
      case ",${CI_MERGE_REQUEST_LABELS:-}," in
        *,design:none,*) echo "ラベル design:none: skip"; exit 0 ;;
      esac
      # 逃がし: MR 説明の Design: none（行頭・大文字小文字無視）
      if printf '%s' "${CI_MERGE_REQUEST_DESCRIPTION:-}" | grep -qiE '^[[:space:]]*design:[[:space:]]*none\b'; then
        echo "MR 説明に Design: none: skip"; exit 0
      fi
      # docs/design/ 配下の差分があるか（三点＝merge-base 起点）
      git fetch -q origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
      if git diff --name-only "${CI_MERGE_REQUEST_DIFF_BASE_SHA}...HEAD" | grep -q '^docs/design/'; then
        echo "設計書（docs/design/）の更新あり: ok"
      else
        echo "feat/fix の MR に docs/design/ の更新がありません。設計書を更新するか、MR 説明に 'Design: none' を書くか 'design:none' ラベルを付けてください。（Web の UI 変更時は設計書の「UI/画面設計」節も更新すること）" >&2
        exit 1
      fi

# docs/要件定義書.md の必須節（節構成の正は /project-setup が生成する要件定義書）の欠落を警告する。
# 要件定義書が無いプロジェクト（既存導入で opt-out した等）では skip。まずは warning 運用
# （fail させない）— 節名はプロジェクトの実情で増減し得るため、強制はレビューに委ねる。
requirements-doc-check:
  stage: test
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main")'
  script:
    - |
      set -eu
      DOC="docs/要件定義書.md"
      if [ ! -f "$DOC" ]; then
        echo "$DOC なし: skip"; exit 0
      fi
      MISSING=0
      for h in 背景・目的 スコープ 主要機能 業務フロー 非機能要件 テスト方針 技術選定 リリース・運用 未決事項 変更履歴; do
        if ! grep -qE "^#+[[:space:]].*${h}" "$DOC"; then
          echo "warning: 必須節「${h}」の見出しが見つかりません（該当しない節も「該当なし」を明示して残す）" >&2
          MISSING=1
        fi
      done
      if [ "$MISSING" = 0 ]; then echo "必須節 ok"; fi
      exit 0   # 警告のみ（fail させない）

# frontmatter に kind: ui を持つ設計書（docs/design/）に「## UI/画面設計」見出しを要求する。
# kind は任意キー（docs-site/src/content.config.ts）— 付けた領域だけ節構造を検査する。
ui-section-check:
  stage: test
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main")'
  before_script:
    - apk add --no-cache python3 >/dev/null
  script:
    - |
      python3 - <<'EOF'
      import pathlib, re, sys

      root = pathlib.Path("docs/design")
      if not root.is_dir():
          print("docs/design なし: skip"); sys.exit(0)
      errors = []
      for path in sorted(root.rglob("*.md")):
          text = path.read_text(encoding="utf-8")
          m = re.match(r"\A---\r?\n(.*?)\r?\n---\r?\n", text, re.S)
          if not m:
              continue  # frontmatter なし（索引 README.md 等）は対象外
          if not re.search(r"^kind:\s*['\"]?ui['\"]?\s*$", m.group(1), re.M):
              continue
          if not re.search(r"^##\s*UI/画面設計", text[m.end():], re.M):
              errors.append(str(path))
      for p in errors:
          print(f"{p}: kind: ui の設計書に「## UI/画面設計」見出しがありません（節テンプレートは .claude/rules/design-doc.md）", file=sys.stderr)
      if not errors:
          print("kind: ui の節構造 ok")
      sys.exit(1 if errors else 0)
      EOF

# frontmatter に kind: data を持つ設計書（docs/design/）に「## データモデル」見出しを要求する。
# ui-section-check の双子（kind:ui→UI/画面設計 と対称）。GH↔GL の双子一致は
# scripts/check_template_consistency.py が機械検証する。
data-model-section-check:
  stage: test
  image: alpine:latest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main")'
  before_script:
    - apk add --no-cache python3 >/dev/null
  script:
    - |
      python3 - <<'EOF'
      import pathlib, re, sys

      root = pathlib.Path("docs/design")
      if not root.is_dir():
          print("docs/design なし: skip"); sys.exit(0)
      errors = []
      for path in sorted(root.rglob("*.md")):
          text = path.read_text(encoding="utf-8")
          m = re.match(r"\A---\r?\n(.*?)\r?\n---\r?\n", text, re.S)
          if not m:
              continue  # frontmatter なし（索引 README.md 等）は対象外
          if not re.search(r"^kind:\s*['\"]?data['\"]?\s*$", m.group(1), re.M):
              continue
          if not re.search(r"^##\s*データモデル", text[m.end():], re.M):
              errors.append(str(path))
      for p in errors:
          print(f"{p}: kind: data の設計書に「## データモデル」見出しがありません（節テンプレートは .claude/rules/design-doc.md）", file=sys.stderr)
      if not errors:
          print("kind: data の節構造 ok")
      sys.exit(1 if errors else 0)
      EOF

# docs-site（Astro+Starlight）の設計書スキーマ検証を MR で先行ゲートする。
# docs-site/ か docs/design/ に変更を含む MR でのみ astro check（npm run check）を実行し、
# ① Dependabot/Renovate 等の docs-site 依存 bump の破壊と ② 設計書 frontmatter のスキーマ不適合を、
# Pages デプロイ（pages.yml は default ブランチ push のみ）を待たず MR で捕捉する。
# docs サイト未使用なら削除してよい（ルート .gitlab-ci.yml の include 行は design-doc-check 共用）。
# このゲートは project-profile.json の docsSite.enabled を読まない（CI 段での無効化は
# docs-site/ 削除かこのジョブ削除）。ローカル pre-commit の docsSite.enabled 駆動とは独立。
# GH .github/workflows/design-doc-check.yml の同名ジョブと双子（GH↔GL 一致は
# scripts/check_template_consistency.py が検証する）。
docs-site-schema-check:
  stage: test
  image: node:24
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main")'
      changes:
        - docs-site/**/*
        - docs/design/**/*
  script:
    - |
      set -eu
      if [ ! -d docs-site ]; then echo "docs-site なし: skip"; exit 0; fi
      cd docs-site
      npm ci
      npm run check
