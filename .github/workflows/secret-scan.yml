name: Secret Scan

# 秘密情報（API キー・トークン・接続文字列等）のコミット混入を PR で検出する CI 雛形。
# .gitignore（誤 track 防止）・security-guidance プラグイン（セッション層）・ホストの
# Push protection と並ぶ多段ガードの CI 層（多段構成の正は .claude/rules/operations.md
# 「秘密情報の管理」）。不要なプロジェクトはこのファイルを削除してよい。
#
# gitleaks（MIT ライセンス・単一バイナリ）を公式リリースから sha256 ピン留めで取得して
# 直接実行する（gitleaks-action は組織利用に別途ライセンスが要るため使わない）。
# スキャン範囲は PR の差分コミットのみ（既存リポジトリへ後から導入した時に、過去履歴の
# 検出で CI が埋まるのを避ける）。全履歴の初回点検は手動実行（workflow_dispatch）で行う。
# 安全側設計: gitleaks の取得失敗・実行エラー等の環境問題は警告して成功（CI 自体を壊さない）、
# 秘密情報の検出のみ fail する。
# 逃がし（誤検知）: 当該行末に「gitleaks:allow」コメントを付けるか、リポジトリ直下の
# .gitleaks.toml（allowlist）でパス・ルール単位で除外する（gitleaks ネイティブの仕組み）。
# 検出されたら: push された秘密は漏えいとみなし、必ず失効・ローテーションする（履歴の
# 書き換えだけでは不十分）。
# 更新: バージョンを上げるときは公式リリースの gitleaks_<ver>_checksums.txt から
# linux_x64 の sha256 を取得して GITLEAKS_SHA256 を差し替える
# （https://github.com/gitleaks/gitleaks/releases）。
on:
  pull_request:
    branches: [develop, main]
  workflow_dispatch:   # 手動実行＝全履歴スキャン（既存リポジトリへ導入した直後の初回点検用）

# 最小権限（least privilege）: チェックアウトと git log の読み取りのみ
permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan for secrets (gitleaks)
        env:
          # v8.30.1（2026-03 リリース）。sha256 は公式リリース添付の checksums.txt の linux_x64 値。
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          # --- 取得（環境問題は警告して成功＝CI 自体を壊さない） ---
          if ! curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"; then
            echo "::warning::gitleaks の取得に失敗したためスキャンをスキップします（ネットワーク等の環境問題）"
            exit 0
          fi
          if ! echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -; then
            echo "::warning::gitleaks の sha256 が一致しないためスキャンをスキップします（ピン留めと異なるバイナリは実行しない。公式 checksums.txt と照合して GITLEAKS_SHA256 を更新すること）"
            exit 0
          fi
          if ! tar xzf gitleaks.tar.gz gitleaks; then
            echo "::warning::gitleaks アーカイブの展開に失敗したため、環境問題としてスキャンをスキップします"
            exit 0
          fi
          # --- スキャン範囲（PR は差分コミットのみ・手動実行は全履歴） ---
          LOG_OPTS=""
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            LOG_OPTS="origin/${BASE_REF}..HEAD"   # 二点＝PR のコミットのみ（過去履歴を巻き込まない）
          fi
          # --exit-code 2 で「検出」と「実行エラー」を区別する（検出のみ fail）。-v は所見の
          # ファイル・行・ルールを出すために必要で、秘密値そのものは --redact が伏せる。
          set +e
          if [ -n "$LOG_OPTS" ]; then
            ./gitleaks git --no-banner --redact -v --exit-code 2 --log-opts "$LOG_OPTS" .
          else
            ./gitleaks git --no-banner --redact -v --exit-code 2 .
          fi
          code=$?
          set -e
          case "$code" in
            0) echo "秘密情報の検出なし: ok" ;;
            2) echo "::error::秘密情報らしき文字列を検出しました。コミットから秘密を取り除き、push 済みの鍵は必ず失効・ローテーションしてください（誤検知なら当該行に 'gitleaks:allow' コメントを付けるか .gitleaks.toml の allowlist で除外する。.claude/rules/operations.md「秘密情報の管理」参照）"
               exit 1 ;;
            *) echo "::warning::gitleaks の実行に失敗しました（exit=${code}）。環境問題として成功扱いにします"
               exit 0 ;;
          esac
