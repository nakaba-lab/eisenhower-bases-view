# 秘密情報（API キー・トークン・接続文字列等）のコミット混入を MR で検出する CI ジョブ（include 用スニペット）。
#
# 有効化: 出荷のルート .gitlab-ci.yml が既にこのスニペットを include 済み（追加設定は不要）。
# 不要ならルート .gitlab-ci.yml の include 行を外してこのファイルを削除する。
# .gitignore（誤 track 防止）・security-guidance プラグイン（セッション層）・ホストの push 保護と
# 並ぶ多段ガードの CI 層（多段構成の正は .claude/rules/operations.md「秘密情報の管理」）。
#
# gitleaks（MIT ライセンス・単一バイナリ）を公式リリースから sha256 ピン留めで取得して直接実行する。
# スキャン範囲は MR の差分コミットのみ（既存リポジトリへ後から導入した時に、過去履歴の検出で
# CI が埋まるのを避ける。既存リポジトリの初回点検はローカルで gitleaks git〔引数なし＝全履歴〕を実行する）。
# 安全側設計: gitleaks の取得失敗・実行エラー等の環境問題は警告して成功（CI 自体を壊さない）、
# 秘密情報の検出のみ fail する。
# 逃がし（誤検知）: 当該行末に「gitleaks:allow」コメントを付けるか、リポジトリ直下の
# .gitleaks.toml（allowlist）でパス・ルール単位で除外する（gitleaks ネイティブの仕組み）。
# なお GitLab 標準のパイプライン版 Secret Detection（Security/Secret-Detection.gitlab-ci.yml の
# include・全ティア無料）でも代替・併用できる（/project-setup の「バージョン管理・リモート同期」
# タスクが案内する）。push の瞬間に止める Secret push protection は Ultimate のみ。
# 更新: バージョンを上げるときは公式リリースの gitleaks_<ver>_checksums.txt から linux_x64 の
# sha256 を取得して GITLEAKS_SHA256 を差し替える（https://github.com/gitleaks/gitleaks/releases）。
# stage: test は出荷のルート .gitlab-ci.yml の stages に対応（独自 stages のプロジェクトへ
# 後載せする場合は自分の stages に合わせて変更すること）。
secret-scan:
  stage: test
  image: alpine:latest
  variables:
    GIT_DEPTH: 0   # 差分範囲（CI_MERGE_REQUEST_DIFF_BASE_SHA）を確実に含める（浅いクローンだと bad revision で落ちる）
    # v8.30.1（2026-03 リリース）。sha256 は公式リリース添付の checksums.txt の linux_x64 値。
    GITLEAKS_VERSION: "8.30.1"
    GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && ($CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "develop" || $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main")'
  script:
    - |
      set -eu
      # --- 環境準備（環境問題は警告して成功＝CI 自体を壊さない） ---
      if ! apk add --no-cache git curl >/dev/null; then
        echo "warning: 依存パッケージ（git・curl）の導入に失敗したため、環境問題としてスキャンをスキップします" >&2
        exit 0
      fi
      # --- 取得（環境問題は警告して成功＝CI 自体を壊さない） ---
      if ! curl -sSfL -o gitleaks.tar.gz \
        "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"; then
        echo "warning: gitleaks の取得に失敗したためスキャンをスキップします（ネットワーク等の環境問題）" >&2
        exit 0
      fi
      if ! echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -; then
        echo "warning: gitleaks の sha256 が一致しないためスキャンをスキップします（ピン留めと異なるバイナリは実行しない。公式 checksums.txt と照合して GITLEAKS_SHA256 を更新すること）" >&2
        exit 0
      fi
      if ! tar xzf gitleaks.tar.gz gitleaks; then
        echo "warning: gitleaks アーカイブの展開に失敗したため、環境問題としてスキャンをスキップします" >&2
        exit 0
      fi
      # --- スキャン（MR の差分コミットのみ。二点＝過去履歴を巻き込まない） ---
      if ! git fetch -q origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"; then
        echo "warning: ターゲットブランチの fetch に失敗したため、環境問題としてスキャンをスキップします" >&2
        exit 0
      fi
      # --exit-code 2 で「検出」と「実行エラー」を区別する（検出のみ fail）。-v は所見の
      # ファイル・行・ルールを出すために必要で、秘密値そのものは --redact が伏せる。
      set +e
      ./gitleaks git --no-banner --redact -v --exit-code 2 --log-opts "${CI_MERGE_REQUEST_DIFF_BASE_SHA}..HEAD" .
      code=$?
      set -e
      case "$code" in
        0) echo "秘密情報の検出なし: ok" ;;
        2) echo "秘密情報らしき文字列を検出しました。コミットから秘密を取り除き、push 済みの鍵は必ず失効・ローテーションしてください（誤検知なら当該行に 'gitleaks:allow' コメントを付けるか .gitleaks.toml の allowlist で除外する。.claude/rules/operations.md「秘密情報の管理」参照）" >&2
           exit 1 ;;
        *) echo "warning: gitleaks の実行に失敗しました（exit=${code}）。環境問題として成功扱いにします" >&2
           exit 0 ;;
      esac
