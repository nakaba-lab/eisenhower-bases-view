# 依存の脆弱性・更新を自動で PR 化する（Dependabot）。不要なら削除してよい。
#
# 実効エントリは同梱資産の 2 つ（docs-site/ の npm と、同梱 CI の github-actions）。
# 利用者プロジェクトのスタック向けエントリは、/project-setup がスタック確定時に下の
# コメント例から有効化して追記する。
# GitLab には Dependabot が無いため、Renovate か GitLab の Dependency Scanning を使う
# （.gitlab/ci/app-test.yml のコメント参照）。
version: 2
updates:
  # プラグイン本体（ルート package.json）の依存更新。/project-setup がスタック確定時に有効化。
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly

  # docs-site（Astro+Starlight）の依存更新。docs サイトを使わない（docs-site/ を削除した）
  # プロジェクトはこのエントリも削除する。
  - package-ecosystem: npm
    directory: /docs-site
    schedule:
      interval: weekly
    # astro 本体と @astrojs/*・astro-* は peer 依存で密結合のため 1 PR にまとめる
    # （個別昇格は npm ci の ERESOLVE で互いにブロックし合うため）。
    groups:
      astro:
        patterns: ["astro", "@astrojs/*", "astro-*"]

  # 同梱 CI（.github/workflows/）と利用者が後から足すワークフローの Action 更新。
  # 同梱 CI はテンプレートが出荷するスタック非依存の資産のため、既定で有効にしている。
  # サプライチェーン強化が要るプロジェクトは `actions/checkout@<sha> # v5` の SHA ピンに
  # 切り替えてよい（Dependabot が SHA も追従更新する）。
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  # 注: .mcp.json の MCP サーバー（npx 直指定・バージョン固定済みの chrome-devtools-mcp）は
  # Dependabot の走査対象外。更新は /project-resync の依存点検の節目などに
  # `npm view chrome-devtools-mcp version` で最新を確認し、意図的な作業として書き換える
  # （@latest へ戻すと未審査の最新版がセッション起動のたびに無確認で実行されるため戻さない）。

